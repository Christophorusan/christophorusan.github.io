  <path d="M 1310 770 L 1310 862 L 290 862 L 290 778" stroke="#aaa9a3" stroke-width="2.5" stroke-dasharray="1 9" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <rect x="470" y="838" width="660" height="46" fill="#fbfaf7"/>
  <text x="800" y="869" font-size="18" font-weight="600" letter-spacing="2.5" fill="#aaa9a3" text-anchor="middle">FEEDBACK — RESULTS · CORRECTIONS · CONTEXT</text>

  <text x="90" y="948" font-size="19" fill="#7b7b76">Claude Code and Codex form the human review loop. Every run improves the next one.</text>
