  <line x1="500" y1="535" x2="576" y2="535" stroke="#aaa9a3" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="590" y="300" width="420" height="470" rx="10" fill="#1c1c19"/>
  <text x="800" y="386" font-size="46" font-weight="500" letter-spacing="-1" fill="#ffffff" text-anchor="middle">Hermes</text>
  <text x="800" y="422" font-size="16" font-weight="600" letter-spacing="3" fill="#8f8f88" text-anchor="middle">OPERATING LAYER</text>
  <line x1="632" y1="456" x2="968" y2="456" stroke="#3a3a35" stroke-width="2"/>
  <g text-anchor="middle">
    <text x="800" y="512" font-size="25" font-weight="500" fill="#ffffff">Memory</text>
    <text x="800" y="541" font-size="18" fill="#8f8f88">context, history, rules</text>
    <text x="800" y="600" font-size="25" font-weight="500" fill="#ffffff">Skills</text>
    <text x="800" y="629" font-size="18" fill="#8f8f88">repeatable work across ops and growth</text>
    <text x="800" y="688" font-size="25" font-weight="500" fill="#ffffff">Connectors</text>
    <text x="800" y="717" font-size="18" fill="#8f8f88">email, docs, socials, internal tools</text>
  </g>

  <line x1="1024" y1="535" x2="1100" y2="535" stroke="#aaa9a3" stroke-width="3" marker-end="url(#arrow)"/>

