      <path d="M0,1.5 L8,5 L0,8.5 Z" fill="#aaa9a3"/>
    </marker>
  </defs>

  <text x="90" y="100" font-size="21" font-weight="600" letter-spacing="3.5" fill="#aaa9a3">OSLO — AI OPERATING SYSTEM</text>
