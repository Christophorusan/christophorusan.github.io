    <line x1="1142" y1="419" x2="1158" y2="419" stroke="#c9c7bf" stroke-width="3"/><text x="1174" y="427">Messages sent</text>
    <line x1="1142" y1="489" x2="1158" y2="489" stroke="#c9c7bf" stroke-width="3"/><text x="1174" y="497">Records updated</text>
