<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="980" fill="#F1F1EB"/>

  <defs>
    <linearGradient id="bgGlowA" x1="240" y1="140" x2="520" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EDF9F2" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#EDF9F2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bgGlowB" x1="1040" y1="120" x2="1380" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E2F6A1" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#E2F6A1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="heroCard" x1="70" y1="250" x2="280" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EDF9F2"/>
      <stop offset="1" stop-color="#E8EDEC"/>
    </linearGradient>
    <linearGradient id="softCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#EDF9F2" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#173132" flood-opacity="0.08"/>
    </filter>
    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#7A9A88"/>
    </marker>
    <style>
      .title { font: 700 58px "Aeonik", "Avenir Next", "Segoe UI", sans-serif; fill: #173132; }
      .subtitle { font: 400 24px "Aeonik", "Avenir Next", "Segoe UI", sans-serif; fill: #6E8176; }
      .boxTitle { font: 700 26px "Aeonik", "Avenir Next", "Segoe UI", sans-serif; fill: #173132; }
      .boxText { font: 500 20px "Aeonik", "Avenir Next", "Segoe UI", sans-serif; fill: #173132; }
      .note { font: 500 19px "Aeonik", "Avenir Next", "Segoe UI", sans-serif; fill: #6E8176; }
      .arrow { stroke: #7A9A88; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .glassStroke { stroke: rgba(255,255,255,0.72); stroke-width: 1.4; }
    </style>
  </defs>

  <circle cx="330" cy="250" r="150" fill="url(#bgGlowA)" filter="url(#softBlur)"/>
  <circle cx="1220" cy="230" r="170" fill="url(#bgGlowB)" filter="url(#softBlur)"/>

  <text x="800" y="88" text-anchor="middle" class="title">How Harmonix Uses AI to Automate Work</text>
  <text x="800" y="128" text-anchor="middle" class="subtitle">a lightweight stack for turning workflows into repeatable systems</text>

  <g filter="url(#cardShadow)">
    <rect x="70" y="250" rx="34" ry="34" width="210" height="220" fill="url(#heroCard)"/>
    <rect x="70" y="250" rx="34" ry="34" width="210" height="220" fill="none" stroke="#D8E7DE" stroke-width="1.6"/>

    <rect x="350" y="250" rx="34" ry="34" width="210" height="220" fill="url(#softCard)"/>
    <rect x="350" y="250" rx="34" ry="34" width="210" height="220" fill="none" stroke="#E2E7E2" stroke-width="1.6"/>

    <rect x="630" y="250" rx="34" ry="34" width="210" height="220" fill="url(#softCard)"/>
    <rect x="630" y="250" rx="34" ry="34" width="210" height="220" fill="none" stroke="#E2E7E2" stroke-width="1.6"/>

    <rect x="910" y="250" rx="34" ry="34" width="230" height="220" fill="url(#softCard)"/>
    <rect x="910" y="250" rx="34" ry="34" width="230" height="220" fill="none" stroke="#E2E7E2" stroke-width="1.6"/>

    <rect x="1210" y="250" rx="34" ry="34" width="210" height="220" fill="url(#softCard)"/>
    <rect x="1210" y="250" rx="34" ry="34" width="210" height="220" fill="none" stroke="#E2E7E2" stroke-width="1.6"/>
  </g>

  <text x="175" y="300" text-anchor="middle" class="boxTitle">Interface</text>
  <text x="175" y="342" text-anchor="middle" class="boxText">Codex</text>
  <text x="175" y="374" text-anchor="middle" class="boxText">Claude Code</text>
  <text x="175" y="416" text-anchor="middle" class="boxText">human loop</text>
  <text x="175" y="448" text-anchor="middle" class="boxText">review + reasoning</text>

  <text x="455" y="300" text-anchor="middle" class="boxTitle">Memory</text>
  <text x="455" y="342" text-anchor="middle" class="boxText">stores data</text>
  <text x="455" y="374" text-anchor="middle" class="boxText">history</text>
  <text x="455" y="406" text-anchor="middle" class="boxText">context</text>
  <text x="455" y="438" text-anchor="middle" class="boxText">rules + preferences</text>

  <text x="735" y="300" text-anchor="middle" class="boxTitle">Skills</text>
  <text x="735" y="342" text-anchor="middle" class="boxText">support</text>
  <text x="735" y="374" text-anchor="middle" class="boxText">finance</text>
  <text x="735" y="406" text-anchor="middle" class="boxText">compliance</text>
  <text x="735" y="438" text-anchor="middle" class="boxText">security · ops · growth</text>

  <text x="1025" y="300" text-anchor="middle" class="boxTitle">Connectors</text>
  <text x="1025" y="342" text-anchor="middle" class="boxText">social media</text>
  <text x="1025" y="374" text-anchor="middle" class="boxText">email · messages</text>
  <text x="1025" y="406" text-anchor="middle" class="boxText">calendar · crm · docs</text>
  <text x="1025" y="438" text-anchor="middle" class="boxText">payments · internal tools</text>

  <text x="1315" y="300" text-anchor="middle" class="boxTitle">Outputs</text>
  <text x="1315" y="342" text-anchor="middle" class="boxText">messages sent</text>
  <text x="1315" y="374" text-anchor="middle" class="boxText">records updated</text>
  <text x="1315" y="406" text-anchor="middle" class="boxText">reports created</text>
  <text x="1315" y="438" text-anchor="middle" class="boxText">tasks completed</text>

  <path d="M280 360 L340 360" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M560 360 L620 360" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M840 360 L900 360" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M1140 360 L1200 360" class="arrow" marker-end="url(#arrowHead)"/>

  <g filter="url(#cardShadow)">
    <rect x="610" y="640" rx="34" ry="34" width="380" height="150" fill="#E2F6A1" fill-opacity="0.68"/>
    <rect x="610" y="640" rx="34" ry="34" width="380" height="150" fill="none" stroke="#D8E7DE" stroke-width="1.6"/>
  </g>
  <text x="800" y="692" text-anchor="middle" class="boxTitle">Feedback</text>
  <text x="800" y="734" text-anchor="middle" class="boxText">results · corrections · new context · performance</text>

  <path d="M1315 470 L1315 560 C1315 610, 1180 620, 1005 640" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M610 715 L420 715 C250 715, 135 640, 135 500 L135 482" class="arrow" marker-end="url(#arrowHead)"/>

  <text x="800" y="860" text-anchor="middle" class="note">Codex and Claude Code are the human loop. Memory stores what Harmonix learns.</text>
  <text x="800" y="892" text-anchor="middle" class="note">Skills do repeatable work. Connectors touch real systems. Feedback improves the next run.</text>
</svg>
