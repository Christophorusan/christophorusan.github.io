    <line x1="122" y1="629" x2="138" y2="629" stroke="#c9c7bf" stroke-width="3"/><text x="154" y="637">Operations</text>
    <line x1="122" y1="685" x2="138" y2="685" stroke="#c9c7bf" stroke-width="3"/><text x="154" y="693">Security workflows</text>
