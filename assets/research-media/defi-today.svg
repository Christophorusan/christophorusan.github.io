<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">DeFi Today research note visual</title>
  <desc id="desc">A research note layout with stablecoin yield, fiat comparison, and protocol evidence panels.</desc>
  <rect width="1200" height="750" fill="#fbfbfa"/>
