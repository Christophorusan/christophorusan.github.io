<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">Louis protocol experiment visual</title>
  <desc id="desc">A protocol architecture diagram for a Morpho fork experiment on HyperEVM.</desc>
  <rect width="1200" height="750" fill="#fbfbfa"/>
  <rect x="64" y="56" width="1072" height="638" rx="28" fill="#fff" stroke="#e8e8e3"/>
  <text x="104" y="118" fill="#92928c" font-family="Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="4">PROTOCOL EXPERIMENT</text>
  <text x="104" y="190" fill="#111" font-family="Arial, sans-serif" font-size="76" font-weight="700" letter-spacing="-4">Louis</text>
  <text x="104" y="240" fill="#626761" font-family="Arial, sans-serif" font-size="28">Morpho-style markets on HyperEVM</text>
  <g transform="translate(104 318)">
    <rect x="330" y="62" width="316" height="146" rx="22" fill="#111"/>
    <text x="488" y="128" fill="#fff" font-family="Arial, sans-serif" font-size="36" font-weight="700" text-anchor="middle">Market Core</text>
    <text x="488" y="164" fill="#aaa" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">rates + collateral + liquidity</text>
    <g fill="none" stroke="#111" opacity=".18" stroke-width="2">
      <path d="M330 135H172"/>
      <path d="M646 135h158"/>
      <path d="M488 62V0"/>
      <path d="M488 208v62"/>
    </g>
    <g>
      <rect x="0" y="72" width="172" height="126" rx="18" fill="#f4f7ff" stroke="#dfe6f7"/>
      <text x="24" y="122" fill="#111" font-family="Arial, sans-serif" font-size="24" font-weight="700">Users</text>
      <rect x="24" y="150" width="96" height="9" rx="5" fill="#111" opacity=".1"/>
    </g>
    <g transform="translate(804 72)">
      <rect width="172" height="126" rx="18" fill="#f4fbf7" stroke="#dcefe4"/>
      <text x="24" y="50" fill="#111" font-family="Arial, sans-serif" font-size="24" font-weight="700">Vaults</text>
      <rect x="24" y="78" width="110" height="9" rx="5" fill="#111" opacity=".1"/>
    </g>
    <g transform="translate(402 -74)">
      <rect width="172" height="126" rx="18" fill="#fff8ee" stroke="#eee0c9"/>
      <text x="24" y="50" fill="#111" font-family="Arial, sans-serif" font-size="24" font-weight="700">Risk</text>
      <rect x="24" y="78" width="102" height="9" rx="5" fill="#111" opacity=".1"/>
    </g>
    <g transform="translate(402 270)">
      <rect width="172" height="126" rx="18" fill="#f8f5ff" stroke="#e7defa"/>
      <text x="24" y="50" fill="#111" font-family="Arial, sans-serif" font-size="24" font-weight="700">Docs</text>
      <rect x="24" y="78" width="118" height="9" rx="5" fill="#111" opacity=".1"/>
    </g>
  </g>
</svg>
