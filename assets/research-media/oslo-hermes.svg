<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Simplified Oslo architecture diagram</title>
  <desc id="desc">A simplified architecture diagram showing Oslo entry points, agent core, signals, skills, units, memory, connectors, safety, outputs, control plane, and observability.</desc>
  <rect width="1600" height="1000" fill="#172b2c"/>
  <rect x="56" y="48" width="1488" height="904" rx="34" fill="#1e3839" stroke="#305858" stroke-width="2"/>

  <text x="104" y="118" fill="#e2f6a1" font-family="Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="5">OSLO</text>
  <text x="104" y="166" fill="#ffffff" font-family="Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="-1">Growth Intelligence Architecture</text>
  <text x="104" y="204" fill="#a8bdb0" font-family="Arial, sans-serif" font-size="20">Many surfaces, one agent core, shared memory, gated execution.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#e2f6a1"/>
    </marker>
    <style>
      .label { fill: #6b8577; font: 700 16px Arial, sans-serif; letter-spacing: 2px; text-transform: uppercase; }
      .title { fill: #ffffff; font: 700 24px Arial, sans-serif; }
      .sub { fill: #a8bdb0; font: 16px Arial, sans-serif; }
      .mono { fill: #a8bdb0; font: 15px "Arial", sans-serif; }
      .box { fill: #172b2c; stroke: #305858; stroke-width: 2; }
      .boxSoft { fill: rgba(226,246,161,0.08); stroke: rgba(226,246,161,0.35); stroke-width: 2; }
      .pill { fill: #223f40; stroke: #305858; stroke-width: 1.5; }
      .line { stroke: rgba(226,246,161,0.5); stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .thin { stroke: rgba(226,246,161,0.22); stroke-width: 2; fill: none; }
    </style>
  </defs>

  <g transform="translate(104 250)">
    <rect class="box" x="0" y="0" width="1392" height="98" rx="18"/>
    <text class="label" x="32" y="34">Entry Points</text>
    <g transform="translate(30 48)">
      <rect class="pill" x="0" y="0" width="186" height="32" rx="16"/>
      <rect class="pill" x="208" y="0" width="186" height="32" rx="16"/>
      <rect class="pill" x="416" y="0" width="186" height="32" rx="16"/>
      <rect class="pill" x="624" y="0" width="186" height="32" rx="16"/>
      <rect class="pill" x="832" y="0" width="186" height="32" rx="16"/>
      <rect class="pill" x="1040" y="0" width="284" height="32" rx="16"/>
      <text class="mono" x="93" y="21" text-anchor="middle">Codex</text>
      <text class="mono" x="301" y="21" text-anchor="middle">Claude Code</text>
      <text class="mono" x="509" y="21" text-anchor="middle">Discord</text>
      <text class="mono" x="717" y="21" text-anchor="middle">Telegram</text>
      <text class="mono" x="925" y="21" text-anchor="middle">Cron / API</text>
      <text class="mono" x="1182" y="21" text-anchor="middle">X reactions + app activity</text>
    </g>
  </g>

  <path class="line" d="M800 348 V398"/>

  <g transform="translate(420 398)">
    <rect class="boxSoft" x="0" y="0" width="760" height="128" rx="24"/>
    <text class="label" x="36" y="38">Agent Core + Gateway</text>
    <text class="title" x="380" y="76" text-anchor="middle">normalize input -> load context -> route model -> call tools</text>
    <text class="sub" x="380" y="104" text-anchor="middle">stream result -> save session -> write memory</text>
  </g>

  <path class="line" d="M800 526 V572"/>

  <g transform="translate(176 572)">
    <rect class="box" x="0" y="0" width="1248" height="112" rx="18"/>
    <text class="label" x="32" y="34">Signals + Dispatch</text>
    <text class="sub" x="32" y="70">watch revenue, deposits, withdrawals, conversion, retention</text>
    <text class="sub" x="32" y="96">classify user or partner -> enrich profile -> route to unit</text>
  </g>

  <path class="line" d="M800 684 V728"/>

  <g transform="translate(104 728)">
    <g>
      <rect class="box" x="0" y="0" width="296" height="142" rx="18"/>
      <text class="label" x="24" y="34">Skills</text>
      <text class="sub" x="24" y="68">flat verb namespace</text>
      <text class="mono" x="24" y="96">research · recommend · draft</text>
      <text class="mono" x="24" y="120">track · measure · improve</text>
    </g>
    <g transform="translate(332 0)">
      <rect class="box" x="0" y="0" width="296" height="142" rx="18"/>
      <text class="label" x="24" y="34">Units</text>
      <text class="sub" x="24" y="68">six departments</text>
      <text class="mono" x="24" y="96">BD · Marketing · Engineering</text>
      <text class="mono" x="24" y="120">Security · Ops · Data</text>
    </g>
    <g transform="translate(664 0)">
      <rect class="box" x="0" y="0" width="296" height="142" rx="18"/>
      <text class="label" x="24" y="34">Memory + Connectors</text>
      <text class="sub" x="24" y="68">shared company graph</text>
      <text class="mono" x="24" y="96">X · Supabase · GitHub</text>
      <text class="mono" x="24" y="120">Hyperliquid · analytics</text>
    </g>
    <g transform="translate(996 0)">
      <rect class="box" x="0" y="0" width="296" height="142" rx="18"/>
      <text class="label" x="24" y="34">Safety + Outputs</text>
      <text class="sub" x="24" y="68">approval gates + guards</text>
      <text class="mono" x="24" y="96">briefs · DMs · reports</text>
      <text class="mono" x="24" y="120">posts · files · logged outcomes</text>
    </g>
  </g>

  <g transform="translate(144 900)">
    <path class="thin" d="M0 0 H1312"/>
    <text class="mono" x="0" y="34">Control plane: skill registry · prompt registry · connector catalog · eval harness · feature flags · session routing</text>
    <text class="mono" x="0" y="62">Observability spine: traces · logs · metrics · replayable runs · token cost · latency · success rate</text>
  </g>
</svg>
