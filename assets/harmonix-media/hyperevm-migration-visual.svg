<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">HyperEVM Migration visual</title>
  <desc id="desc">Harmonix vaults moving into HyperEVM distribution infrastructure.</desc>
  <rect width="1600" height="1000" fill="#f8faf8"/>
  <rect x="72" y="72" width="1456" height="856" rx="34" fill="#ffffff" stroke="#e2e9e2" stroke-width="2"/>
  <text x="132" y="168" fill="#7b8a7d" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="34" font-weight="700" letter-spacing="4">CHAIN ROLLOUT</text>
  <text x="132" y="262" fill="#102014" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="92" font-weight="620">HyperEVM Migration</text>
  <text x="132" y="332" fill="#536257" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="35">Partner and chain rollout for Harmonix vault products on Hyperliquid-native liquidity.</text>
  <rect x="132" y="470" width="430" height="240" rx="24" fill="#f4f8f4" stroke="#dfe8df" stroke-width="2"/>
  <text x="174" y="555" fill="#102014" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="50" font-weight="650">Vaults</text>
  <text x="174" y="616" fill="#657266" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="30">Yield products prepared</text>
  <text x="174" y="656" fill="#657266" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="30">for ecosystem distribution.</text>
  <path d="M650 590H930" stroke="#9eb59e" stroke-width="12" stroke-linecap="round"/>
  <path d="M910 532l72 58-72 58" fill="none" stroke="#9eb59e" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="1038" y="470" width="430" height="240" rx="24" fill="#102014"/>
  <text x="1080" y="555" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="50" font-weight="650">HyperEVM</text>
  <text x="1080" y="616" fill="#cde3ce" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="30">Chain-native rollout</text>
  <text x="1080" y="656" fill="#cde3ce" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="30">across partners and users.</text>
</svg>
