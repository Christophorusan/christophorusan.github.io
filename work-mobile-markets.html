<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Markets - Christophorus</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fff;
      color: #111;
      font-size: 16px;
      line-height: 1.65;
      padding: 46px 20px 84px;
    }

    .container { max-width: 640px; margin: 0 auto; }

    .back {
      display: inline-block;
      color: #8f8f8f;
      font-size: 14px;
      text-decoration: none;
      margin-bottom: 42px;
    }

    .back:hover { color: #111; text-decoration: underline; }

    header { max-width: 620px; margin-bottom: 46px; }

    .date {
      color: #a0a0a0;
      font-size: 13px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(38px, 7vw, 58px);
      font-weight: 520;
      letter-spacing: -0.035em;
      line-height: 1;
      margin-bottom: 18px;
    }

    .intro {
      color: #2b2b2b;
      font-size: clamp(17px, 2vw, 20px);
      line-height: 1.5;
    }

    .section {
      border-top: 1px solid #ededed;
      padding-top: 26px;
      max-width: 640px;
    }

    .media-tools {
      margin-bottom: 16px;
      font-size: 14px;
    }

    .media-tools a {
      color: #777;
      text-decoration: none;
    }

    .media-tools a:hover { color: #111; text-decoration: underline; }

    .media-block {
      max-width: 430px;
      overflow: hidden;
    }

    .twitter-tweet { max-width: 430px !important; }

    footer {
      color: #c6c6c6;
      font-size: 13px;
      margin-top: 58px;
    }

    @media (max-width: 700px) {
      body { padding: 32px 18px 64px; font-size: 15px; }
      .back { margin-bottom: 34px; }
      header { margin-bottom: 38px; }
      .section { padding-top: 22px; }
      .media-block { max-width: 100%; }
    }
  </style>
</head>
<body>
  <main class="container">
    <a class="back" href="selected-work.html">Selected Work</a>

    <header>
      <div class="date">18 June, 2026</div>
      <h1>Mobile Markets</h1>
      <p class="intro">
        A mobile concept exploring how prediction markets could feel more immediate, lightweight, and native to everyday consumer behavior.
      </p>
    </header>

    <section class="section">
      <div class="media-tools">
        <a href="https://x.com/christophorusan/status/2051887694285091313?s=20" target="_blank" rel="noreferrer">Open on X</a>
      </div>
      <div class="media-block">
        <blockquote class="twitter-tweet" data-width="430">
          <a href="https://x.com/christophorusan/status/2051887694285091313?s=20"></a>
        </blockquote>
      </div>
    </section>

    <footer>&copy; 2026 Christophorus</footer>
  </main>
  <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
</body>
</html>
