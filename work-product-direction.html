<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Direction - Christophorus</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fff;
      color: #111;
      font-size: 19px;
      line-height: 1.65;
      padding: 48px 20px 96px;
    }

    .container { max-width: 940px; margin: 0 auto; }

    .back {
      display: inline-block;
      color: #8f8f8f;
      font-size: 15px;
      text-decoration: none;
      margin-bottom: 58px;
    }

    .back:hover { color: #111; text-decoration: underline; }

    header { max-width: 780px; margin-bottom: 72px; }

    .date {
      color: #a0a0a0;
      font-size: 16px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(54px, 9vw, 96px);
      font-weight: 520;
      letter-spacing: -0.04em;
      line-height: 0.96;
      margin-bottom: 28px;
    }

    .intro {
      color: #2b2b2b;
      font-size: clamp(21px, 2.4vw, 29px);
      line-height: 1.45;
    }

    .section {
      border-top: 1px solid #ededed;
      padding-top: 34px;
      max-width: 760px;
    }

    .media-tools {
      margin-bottom: 24px;
      font-size: 15px;
    }

    .media-tools a {
      color: #777;
      text-decoration: none;
    }

    .media-tools a:hover { color: #111; text-decoration: underline; }

    .media-block {
      max-width: 520px;
      overflow: hidden;
    }

    .twitter-tweet { max-width: 520px !important; }

    footer {
      color: #c6c6c6;
      font-size: 13px;
      margin-top: 86px;
    }

    @media (max-width: 700px) {
      body { padding: 34px 18px 72px; font-size: 17px; }
      .back { margin-bottom: 44px; }
      header { margin-bottom: 54px; }
      .section { padding-top: 28px; }
      .media-block { max-width: 100%; }
    }
  </style>
</head>
<body>
  <main class="container">
    <a class="back" href="selected-work.html">Selected Work</a>

    <header>
      <div class="date">18 June, 2026</div>
      <h1>Product Direction</h1>
      <p class="intro">
        Product and market work focused on making financial infrastructure feel understandable, usable, and distribution-ready for users who live across apps, wallets, and social feeds.
      </p>
    </header>

    <section class="section">
      <div class="media-tools">
        <a href="https://x.com/christophorusan/status/2062653950562812222?s=20" target="_blank" rel="noreferrer">Open on X</a>
      </div>
      <div class="media-block">
        <blockquote class="twitter-tweet" data-width="520">
          <a href="https://x.com/christophorusan/status/2062653950562812222?s=20"></a>
        </blockquote>
      </div>
    </section>

    <footer>&copy; 2026 Christophorus</footer>
  </main>
  <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
</body>
</html>
